<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A visual-only Newton's cradle simulation lab interface built with Three.js."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Newton's Cradle Simulation Lab</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene-canvas" aria-label="Newton's cradle experiment scene"></canvas>

      <section id="config-screen" class="config-screen" aria-labelledby="lab-title">
        <form id="config-form" class="config-panel">
          <p class="eyebrow">Visual Experiment Setup</p>
          <h1 id="lab-title">Newton's Cradle Simulation Lab</h1>
          <p class="intro">
            Configure the display model before entering the laboratory view.
          </p>

          <label class="field">
            <span class="field-label">Number of Balls</span>
            <span class="range-row">
              <input id="ball-count" name="ballCount" type="range" min="3" max="9" step="1" value="5" />
              <output id="ball-count-output" for="ball-count">5</output>
            </span>
          </label>

          <label class="field">
            <span class="field-label">Initial Thread Length (m)</span>
            <input id="initial-string-length" name="stringLength" type="number" min="0.55" max="5.5" step="0.01" value="2.12" />
          </label>

          <label class="field">
            <span class="field-label">Initial Ball Radius (m)</span>
            <input id="initial-radius" name="radius" type="number" min="0.12" max="1.4" step="0.01" value="0.42" />
          </label>

          <label class="field">
            <span class="field-label">Initial Ball Weight (kg)</span>
            <input id="initial-mass" name="mass" type="number" min="0.05" max="150" step="0.01" value="1.15" />
          </label>

          <label class="field">
            <span class="field-label">Gravity Acceleration G (m/s^2)</span>
            <input id="initial-gravity" name="gravityAcceleration" type="number" min="0" max="50" step="0.01" value="9.82" />
          </label>

          <label class="field">
            <span class="field-label">Ball Material</span>
            <select id="ball-material" name="materialType">
              <option value="Wood">Wood</option>
              <option value="Plastic" selected>Plastic</option>
              <option value="Metal">Metal</option>
            </select>
          </label>

          <button class="start-button" type="submit">Start Experiment</button>
        </form>
      </section>

      <aside id="experiment-panel" class="experiment-panel is-hidden" aria-label="Experiment status">
        <div class="metric-grid">
          <div class="panel-metric">
            <span class="panel-label">Ball Count</span>
            <strong id="panel-ball-count">5</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Thread</span>
            <strong id="panel-string-length">2.12 m</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Radius</span>
            <strong id="panel-radius">0.42 m</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Weight</span>
            <strong id="panel-mass">1.15 kg</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Material</span>
            <strong id="panel-material">Plastic</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Gravity</span>
            <strong id="panel-gravity">9.82 m/s^2</strong>
          </div>
          <div class="panel-metric">
            <span class="panel-label">Status</span>
            <strong id="panel-status">Ready</strong>
          </div>
        </div>

        <div class="parameter-controls" aria-label="Simulation parameters">
          <label class="field compact-field">
            <span class="field-label">Target</span>
            <select id="edit-target"></select>
          </label>

          <label class="field compact-field">
            <span class="field-label">Thread Length (m)</span>
            <input id="edit-string-length" type="number" min="0.55" max="5.5" step="0.01" />
          </label>

          <label class="field compact-field">
            <span class="field-label">Ball Radius (m)</span>
            <input id="edit-radius" type="number" min="0.12" max="1.4" step="0.01" />
          </label>

          <label class="field compact-field">
            <span class="field-label">Ball Weight (kg)</span>
            <input id="edit-mass" type="number" min="0.05" max="150" step="0.01" />
          </label>

          <label class="field compact-field">
            <span class="field-label">Material</span>
            <select id="edit-material">
              <option value="Wood">Wood</option>
              <option value="Plastic" selected>Plastic</option>
              <option value="Metal">Metal</option>
            </select>
          </label>

          <label class="field compact-field">
            <span class="field-label">Gravity G (m/s^2)</span>
            <input id="edit-gravity" type="number" min="0" max="50" step="0.01" />
          </label>
        </div>

        <div id="ball-credential-list" class="ball-credential-list" aria-label="Individual ball parameters"></div>

        <button id="reset-button" class="reset-button" type="button">Reset</button>
      </aside>

      <button
        id="panel-toggle-button"
        class="panel-toggle-button is-hidden"
        type="button"
        aria-controls="experiment-panel"
        aria-expanded="true"
      >
        Hide Parameters
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
